<!--navigatie menu links-->

  <div class="sidenav">

    </a>
  </div>

<!--Rij met links portfolio foto, rechts contactgegevens en formulier-->

  <article class=" row">
    <div class="col-12 col-sm-6 col-md-4">
      <figure>
        <img src="images/Portfolio foto.png" class="img-fluid" alt="portret" title="portret">
      </figure>
    </div>

    <div class="col-12 col-sm-6 mt-5 justify-content-center">
      <h1 class="h1">Contact</h1>
      <h4 class="h4">Contactgegevens</h4>
        <ul class="list">
          <li>Christophe Elens</li>
          <li class="list-inline-item">
            <i class="bi bi-telephone"> +32 xxx xx xx xx</i>
            </a>
            </li><br> <!-- nodig omdat volgende lijst anders niet op nieuwe lijn begint?-->
          <li class="list-inline-item">
            <a href="mailto:christophe.elens@student.ap.be">
            <i class="bi bi-envelope-at"> christophe.elens@student.ap.be</i>
            </a>
          </li><br>                    
          <li class="list-inline-item">
            <a href="https://be.linkedin.com/in/christophe-elens-87996a6a" target="_blank">
            <i class="bi bi-linkedin"> Christophe Elens</i>
            </a>
          </li><br>
        </ul>

<!--contactformulier-->                

    <form action="#" method="POST"> <!-- POST voor veiliger doorzenden gegevens-->
      <fieldset>
        <legend class="h4">Contacteren</legend>
          <article class="row">
            <div class="col-md-6">
              <label for="fname">Voornaam:<span class="span">*</span></label><br>
              <input placeholder="Voornaam" type="text" class="langveld" id="fname" name="fname"><br>
            </div>
            <div class="col-md-6">
              <label for="lname">Achternaam:<span class="span">*</span></label><br>
              <input placeholder="Achternaam" type="text" class="langveld" id="lname" name="lname"><br>
            </div>
          </article>
          <article class="row">
            <div class="col">
              <label for="email">e-mail:<span class="span">*</span></label><br>
              <input placeholder="iemand@ergens.be" type="email" class="langveld" id="email" name="email"><br>
            </div>
          </article>
          <article class="row">
            <div class="col">
              <label for="number">mobiel:</label><br>
              <input placeholder="0412 34 56 78" type="text" class="langveld" id="number" name="number"><br>
            </div>
          </article>
          <article class="row mt-3 mb-3">
            <div class="input-group">
              <span class="input-group-text">Info (optioneel)</span>
              <textarea class="form-control" aria-label="info"></textarea>
            </div>
          </article>
          <article class="row mt-3 mb-3">
            <div class="col">
              <form action="#" method="POST">
              <input type="submit" class="btn-primary" value="Verzenden">
            </div>
          </article>
      </fieldset>
    </form>
</main>
