<!DOCTYPE html>
<html lang="nl-BE">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact</title>
  <!-- resetten van browsers -->
  <link rel="stylesheet" href="css/reset.css">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap CSS icons: https://icons.getbootstrap.com/#usage -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- JavaScript: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer>
    </script>
  <!-- eigen geschreven css voor jouw html-bestand -->
  <link rel="stylesheet" href="style/style.css">
</head>

<body> 
<main class="main">

<!--navigatie menu bovenaan-->
<nav class="navbar fixed-top" style="height: 80px;">
  <div class="container-fluid d-flex justify-content-between align-items-center px-0">
    <a href="index.htm" class="me-3">
      <figure class="img-hover nav-img">
        <img src="images/navigatielogo.jpg" alt="Home" title="Home">
        <div class="caption">Home</div>
      </figure>
    </a>
    <a href="contact.htm">
      <figure class="img-hover nav-img">
        <img src="images/logo_contact.png" alt="Contact" title="Contact">
        <div class="caption">Contact</div>
      </figure>
    </a>
  </div>
</nav>

<!--Rij met links portfolio foto, rechts contactgegevens en formulier-->
<article class=" row">
  <div class="col-12 col-sm-6 col-md-4">
    <figure>
      <img src="images/Portfolio foto.png" class="img-fluid" alt="portret" title="portret">
    </figure>
  </div>

<!--contactgegevens--> 
  <div class="col-12 col-sm-6 mt-4 justify-content-center">
    <h1 class="h1">Contact</h1>
      <h4 class="h4">Contactgegevens</h4>
        <ul class="list">
          <li>Christophe Elens</li>
          <li class="list-inline-item">
            <a> <!-- Mogelijkheid om later automatisch te kunnen koppelen aan telefoonsysteem client-->
            <i class="bi bi-telephone"> +32 xxx xx xx xx</i>
            </a>
          </li><br> <!-- nodig omdat volgende lijst anders niet op nieuwe lijn begint?-->
          <li class="list-inline-item">
            <a href="mailto:christophe.elens@student.ap.be">
            <i class="bi bi-envelope-at"> christophe.elens@student.ap.be</i>
            </a>
          </li><br>                    
          <li class="list-inline-item">
            <a href="https://be.linkedin.com/in/christophe-elens-87996a6a" target="_blank">
            <i class="bi bi-linkedin"> Christophe Elens</i>
            </a>
          </li><br>
        </ul>

<!--contactformulier-->                
  <form name="contact" method="POST" data-netlify="true" data-netlify-recaptcha="true"> <!-- POST voor veiliger doorzenden gegevens-->
    <fieldset>
      <legend class="h4">Contacteren</legend>
        <article class="row">
          <div class="col-md-6">
              <label for="fname">Voornaam:<span class="span">*</span></label><br>
              <input placeholder="Voornaam" type="text" class="langveld" id="fname" name="fname"><br>
          </div>
          <div class="col-md-6">
              <label for="lname">Achternaam:<span class="span">*</span></label><br>
              <input placeholder="Achternaam" type="text" class="langveld" id="lname" name="lname"><br>
          </div>
        </article>
        <article class="row">
          <div class="col">
              <label for="email">e-mail:<span class="span">*</span></label><br>
              <input placeholder="iemand@ergens.be" type="email" class="langveld" id="email" name="email"><br>
          </div>
        </article>
        <article class="row">
          <div class="col">
              <label for="number">mobiel:</label><br>
              <input placeholder="0412 34 56 78" type="text" class="langveld" id="number" name="number"><br>
          </div>
        </article>
        <article class="row mt-3 mb-3">
          <div class="input-group">
              <span class="input-group-text">Vragen?</span>
              <textarea class="form-control" aria-label="info"></textarea>
          </div>
        </article>
        <article class="row mt-3 mb-3">
          <div class="form-group">
              <div data-netlify-recaptcha="true"></div>
          </div>
          <div class="col">
              <input type="submit" class="btn-primary" value="Verzenden">
          </div>
        </article>
    </fieldset>
  </form>

</main>
<footer class="container-fluid bg-light text-center donkerbruin h6 small p-4">
    SYSTEEM- EN NETWERKBEHEERDER: Christophe Elens <br>Bron afbeeldingen: Pexels &copy; en Copilot &copy;
</footer>
</body>

</html>
